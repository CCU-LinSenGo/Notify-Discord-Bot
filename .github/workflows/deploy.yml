name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

# OIDC 需要這個權限才能取得 GitHub 的 ID Token
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Discord Bot to Lambda
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. 安裝 production dependencies
      - name: Install dependencies
        run: npm ci --omit=dev

      # 4. 打包成 Lambda 部署用的 zip
      - name: Package Lambda zip
        run: zip -r lambda.zip src/ package.json package-lock.json node_modules/

      # 5. 使用 OIDC 驗證 AWS (不需要存 Access Key)
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_OSAKA_REGION }}

      # 6. 部署到 Lambda
      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_NOTIFY_DISCORD_BOT_FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip \
            --region ${{ vars.AWS_OSAKA_REGION }}
